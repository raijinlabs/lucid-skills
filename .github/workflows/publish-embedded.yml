# Publishes @raijinlabs/lucid-skills-embedded to GitHub Packages
# Triggered on push to main when packages/embedded/** changes,
# or manually via workflow_dispatch.
name: Publish @raijinlabs/lucid-skills-embedded

on:
  push:
    branches: [main]
    paths:
      - 'packages/embedded/**'
      - 'skills/*/src/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@raijinlabs'

      - name: Install dependencies
        run: npm ci

      - name: Build embedded bundle
        working-directory: packages/embedded
        run: npm run build

      - name: Publish
        working-directory: packages/embedded
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
